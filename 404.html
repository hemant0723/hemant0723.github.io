<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 — Page Not Found | Hemant Verma</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%234f46e5'/><text x='50%25' y='54%25' font-family='Arial,sans-serif' font-size='30' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>HV</text></svg>">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <script>(function(){try{var t=localStorage.getItem('hv-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <style>
        .notfound { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .notfound-inner { max-width: 540px; }
        .notfound .code { font-family: 'Sora','Inter',sans-serif; font-size: clamp(5rem, 20vw, 9rem); font-weight: 700; line-height: 1; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .notfound h1 { font-size: 1.8rem; margin: 0.5rem 0 1rem; }
        .notfound p { color: var(--muted); margin-bottom: 2rem; }
    </style>
</head>
<body>
    <section class="notfound">
        <div class="notfound-inner">
            <div class="code">404</div>
            <h1>Page not found</h1>
            <p>The page you’re looking for doesn’t exist or may have moved.</p>
            <a href="/" class="btn btn-primary"><i class="fas fa-house"></i> Back to home</a>
        </div>
    </section>
</body>
</html>
