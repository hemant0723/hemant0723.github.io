<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="10" fill="url(#accent)"/>

  <!-- Monogram -->
  <rect x="80" y="90" width="120" height="120" rx="28" fill="url(#accent)"/>
  <text x="140" y="170" font-family="Arial, sans-serif" font-size="62" font-weight="bold" fill="#0b1120" text-anchor="middle">HV</text>

  <!-- Name + role -->
  <text x="80" y="320" font-family="'Sora', Arial, sans-serif" font-size="86" font-weight="700" fill="#ffffff">Hemant Verma</text>
  <text x="82" y="385" font-family="Arial, sans-serif" font-size="40" font-weight="600" fill="#c7d2fe">Computational Semiconductor Physics</text>
  <text x="82" y="445" font-family="Arial, sans-serif" font-size="30" fill="#94a3b8">Ph.D. Candidate · National Taiwan University · Academia Sinica</text>

  <!-- Keywords -->
  <text x="82" y="540" font-family="Arial, sans-serif" font-size="26" fill="#818cf8" font-weight="600">DFT  ·  Electron–Phonon Coupling  ·  NEGF Quantum Transport  ·  2D Devices</text>
